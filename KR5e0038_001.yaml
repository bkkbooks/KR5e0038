body:
  text: 洞玄靈寳左玄論卷之一伯五正真無上上仙大道金剛見品之第四者夫不邪曰正無雜曰真明天尊大果三界之縛既亡四見之惑已斷體無邪雜故云正真也無上者最是窮足更無一法能過故云無上上仙者明仙有多種此仙乃是仙中之上仙非是仙中之下仙也一解直言無上此是莫覆之辭以其横該不測縱罩無顛義顯極高故云無上若畢言無上或有監同捉語而論或當有下今欲助成先句故再顯上仙也金剛義有五種第一土地金剛在九方之下七十二澤之間其中有諸金剛之澤名爲土地金剛也第二寳貨金剛如十乘前後三界内外有諸珍寳名爲寳貨金剛也第三神明金剛者如三五八搏將之神名爲神明金剛也第四十乘聖人有智能斷或名爲利智金剛也第五天尊大果名爲堅果金剛也今之所明正是堅果金剛非前土地寳貨神明等之金剛也金剛從諭得名外言砂鑛既無而黄紫性出刳枝鏤石目之爲利體無摧挫所以稱堅内明天尊大果地智慧窮足體利德真喻之若金三界不能傾覆四見不可虧障牢而且實謂之爲剛能覺察無方無幽不覩故言爲見也我師云何至無上師得者我者論主自謂師者乃指玉晨天尊明我師云何得果無爲爲從無上師學得也若夫法體天尊理無修學若報身天尊則有修習也如樂淨信等即是報身天尊也理論天尊應更無師今明欲奬勵學者明一切真仙大聖莫不有師所以經云大道師玄寂又云道法自然即師義也從師得無上法至爲萬仙之宗者無上法者即是三十六部經無上因者即是十七聖乘智慧因未是無上而云無上者以能牽復無上天尊大果所以名無上因也無上果即金剛大果金剛大果更無能上爲萬仙之宗主也清明淨潔至合德者明天尊大果無諸惑障故曰清明又無穢惡故云淨潔也蕭然脫縛故云自在無礙也愉者恬愉明果中有常德恬愉不動也靜者因中有安靜斂翮之行果中有凝然安靜之德也則與虚空合德共成元命不爲無常之所變動也圓滿第一至猶如虚空者功德圓滿無有等雙故云圓滿第一智慧具足無有比類故云智慧第一也此功德智慧彌滿十方猶如虚空無有邊際故云猶如虚空也所謂道者王至二十五性色數者夫道語則通至如五道北帝鬼神並悉稱道明此金剛之道非此等道也若人天地獄之道乃以善惡爲業主或散爲資潤感生人天等也若金剛之道乃以善解爲本因以靜爲資潤感金剛也故知金剛道非此之道也成就無量至一切德宗者成就無量者言金剛大果無量之智並悉成就故言成就無量也此智非是人天仙聖之所能見故云甚深奥慧也以其智成慧深故能爲一切諸德之宗主也四迷斷故慧德具足者四迷即四見惑也夫四見之惑乃與慧道相治惑若未斷慧體被障慧德不能得具四迷若斷慧體無障所以慧德具足也四迷滅空慧德具足者大論斷之與滅亦復相似小而論之復有殊别夫斷是體有滅是體無如斷一物雖斷其體猶在若滅去必同於無今慧既主斷惑所以斷言慧德具足滅必歸空所以滅言空德具足也四迷無援故靜德具足者四迷援即是懆散等也懆散本附四迷上生四迷既滅其懆散亦亡故云四迷無援也靜德具足者散本與靜相治道懆散若在靜德不具懆散既滅所以靜德具足也四迷無枝戒德具足者四迷枝即是惡等也戒即善也夫善與惡相倚伏若惡在善德所以不具惡無所以善德具足也四迷無異因至常德具足者四迷潤善則感人天潤惡則感三塗被其所潤所生之因名爲異因所感之果名爲異果若不爲四迷所潤感生五道因果則感常果故云常德具足也樂德具足至無量無邊德俱皆具足者此明既得常果所以能感諸義德悉皆具足果中無苦故云樂德具足無惑穢故云靜德具足能包容故云大德具足能統王故云王德具足無量無邊德者總明一切諸德並皆具足也何以故昔在至普被衆生者此總結也何以故得如此萬德並皆具足以聖人若在九道域中時備修無上上行慈悲汎愍普被一切衆生所以得其足一切諸德也以慈悲故故入空觀者此明大乘之人先修慈悲有解資生空智後入空觀也以空觀故故入慈悲者此明小乘之人不能廣行慈悲但單修信空等四行至於老觀其行不足不能進入真乘遂停其空行更從生觀習於慈悲也所謂大小兩乘至異義者此總結大乘小乘所修之行也前後異義者大乘人前修慈悲後入空觀小乘人前修空行後習慈悲故云前後異義也作慈觀時至父母妻子者作此慈觀時當觀萬法悉皆平等無有差别之異不見富貴爲上貧賤爲下不見親以爲近踈以爲遠不見父母妻子爲親怨家爲踈也若殺我父母妻子至慈性者若依外教所明父母之讎不同天兄弟之讎不同國朋友之讎不反兵若内教則不然人比殺我父母兄弟妻子我亦須以慈心視之不改變我慈仁之性非但我起慈心於彼亦乃見彼有慈心於我也所謂慈視至與喜智相違者夫嗔是别惑喜是别解解惑相治如嗔惑起則喜智爲之藏喜智生則嗔惑爲之伏故言相違也嗔於喜時至嗔惑强盛者嗔惑若在喜心時生者爲喜智所防嗔惑自成微弱若嗔惑自在嗔心時生者此嗔惑則强盛也亦如水性濡濕至慈觀衆生亦復如是者夫水性濡濕還以水濡水時則易濡於火時則難如慈觀衆生慈於慈時則易慈於嫉妬境則難也慈見衆生至還如慈心所謂是慈者若見衆生還如衆生有高下勝劣貴賤謂爲慈若見衆生起於平等如慈我親不異始可謂是慈也悲喜觀行亦復如是者此悲喜二行亦如慈觀也悲還於悲心則易於暴虐境則難也嗔心在喜心中發者至乃謂爲慈者悲喜不異前解夫慈是别解嫉妬是别惑皆相治道也以慈因故故果大慈至萬道中王者以因地行於汎慈之因故至果中感得大慈之果此是本因本果也未但正惑於本果而已又能感於空淨無礙常樂自在微妙具足萬道中王等義果也以悲因故故得果悲至萬道中王者以悲因故能感得悲果此亦是本因感於本果人能感得空淨無礙常樂自在微妙具足萬道中王等義果也絓智行善行至如之者絓諸智行善行等並得果如慈悲也皆有本因感於本果又能牽諸義果等也時有大仙至願見可乎者時者說論之時也爾時有大仙號三天真人即張天師也得道封三天真人之號故云三天真人也而作是言者欲發詰問之言也道君者指於論主也第一微妙大仙王義者即無上天尊金剛大果也願見可乎者此是謙遜之辭云願聽可已不也時道君答曰至令衆得聞者此論主答也唯願者論主亦施謙敬之言云唯願善說令一切時衆得以聞知曉悟也時三天真人至慈果生時謂從慈因生者此三天真人領論主前所說之義也皆云由於慈本因感得於慈本果此慈果生時還謂從此慈因得生不由從他生也乃至悲喜並云因故生者乃至悲喜等智並云各從其本因故得生亦不從他生也悲喜云不生至不云從慈悲生者悲喜云復不生精進恭敬等智精進恭敬等智還從精進恭敬等本因生不從慈悲因生也云何乃云由悲故至並得果如之者既言慈悲不生精進恭敬等云何言由悲因故感得悲果又能感得空淨無礙等義果絓智行善行並悉得果如之若慈悲不生精進等者亦慈悲不生空淨等也此捉義果難於本因也時高上答言至當爲說之者此是論主所答又施謙遜之辭也所謂因名至肉核相連者夫因乃爲母爲根能生爲母在本曰根也如樹由其有根能生樹身次又生諸枝條肉核花子共相連續也慈爲因至萬道中王者今以慈爲因能感得慈果又能生於空淨等無量義果也乃至悲喜亦復如之者乃至悲喜及精進恭敬等並由本因能牽本果又能生諸無量義果如慈不異也因力有二亦復有三至得慈果故者因力有二亦復有三者一力是慈因能感於慈果二力又能感常三力能感樂無量力能感於無量義果也一解一是慈因二是慈果三是感常無量是感無量德也舊解得慈果故以屬後文今解用配前句已下兩句亦然何故能得如此以其得證於慈果故也名慈爲慈至得常果故者舊解慈名汎愍道號通除因中之道亦通果中之道亦通因中之慈亦汎愍果中之慈亦汎愍也今解不然夫慈以汎愍爲慈故能感得常果亦如道以通除爲道亦能感得常果也所以能然以得當果之故名慈名常至乘爲精進者舊解慈名汎愍常乃凝然喻如乘爲運載精進乃是勒策也今解以慈因感得常果故名常果爲慈亦如精進能資生空解故目空乘爲精進也此解好爲性無嫉妬至慈亦復然者慈解乃與嫉妬惑相治爲性若有於嫉妬之惑慈解不生若無於嫉妬可名爲慈也既有慈心故能憐愛也金剛道至慈亦復然者至金剛大果亦復有慈彌更憐愛也爲性無散亂至名靜者散亂者躁散之惑與靜爲治道相障躁散若在歛翮不成若無於躁散始可名爲靜也靜援慈故得至從肥壯故生者靜資慈解故得因力肥壯名爲義因因力從肥壯即感於金剛名爲義果也生故金剛常至金剛王者既證金剛寅卯俱謝故云常無有惑穢故云淨無能累縛故云自在統包一切故云王也亦如三界至故暴虐者悲解能伏暴虐之惑三界九道衆生只爲無悲所以有於暴虐惑也散亂至亦從肥壯故生者散亂者躁散也躁散援暴虐之惑聞善之因故得肥壯因既肥壯所以果從之而生惑於三界九道也生故三界九道至作具足者凡夫者肥壯因力既生所以惑三界九道被無常所遷苦惱穢累不能自在常怖畏天魔異道衆災惡試心有流動馳散作此具縛凡夫也時三天真人復言至爲衆說之者三天真人又問云大仙此智義深奥非是淺學小仙及三界九道衆生之所計筭可知也雖復蒙告猶自未能了見難見難聞之理更希大仙爲衆說之也如我常依師學至故須言之者三天真人自云我從來常依師學習及以自見自知又恐更有未知未見之事未得未聞今故須言請之也云何慈不生悲至萬道中王者云何慈因不生於悲悲因又不生於戒乃生常樂空淨等果也答言慈中有二力至萬道中王者二力三力不異前解以我慈因有此二力三力乃至無量力所以能牽本果又能感無量義果也二力能生慈德至不爲縁生者舊解一力是慈因二力是慈果故云二力能生慈德今解一力以能生竟但生弱二力生則强也一解比有二力但生於慈不生戒悲精進等何故爾悲戒精進等自有本因不從縁生也故縁亦能生所謂靜援肥因義力者前云戒悲精進不爲縁生今云縁亦能生者明論主所說亦有開塞之義前云不生者明戒悲等自有本因此云縁亦能生者遠作縁由亦得相生如修慈悲又能布施作如此遠縁亦得論相生但非親因縁耳問曰肥因義力至爲自生耶者問云此肥因爲從本因得生爲自從肥因而生也答曰至故名義因者本因彼援清靜資解故肥肥故得生義因此因能感金剛本果名爲異果也所言異果者如善感人天人天不似因名爲異果惡感三塗三塗不似因亦名異果今慧感常常不似因故云異果也此因又在本因上生故云義因也因有二種至一散二靜者因有二種即常與無常也逐援故異者即是靜散二事也靜資慧則感常散援惑聞善惡則感無常所以云逐援故異也果漸來者至所謂靜果者果漸來者即是散所援善惡感生五道也夫無常名漸顯如今日爲因或可明日爲果故云漸來也果頓來者即是常果也夫常名頓顯無常盡常果始起故是頓也乃是靜所資生也故云靜果也散果者至三界九道者散所資生之果乃是無常無淨苦心三界九道衆生也靜果者至虚空慧命者靜果即是靜資慧所感之果也自在者蕭然無累也虚空慧命者智慧與虚空合德共成方命也九道位故散果常來者若在九道之位名爲散果恒來漸報生於九道往還輪轉也金剛自在四見所隔者金剛大果是自在蕭然之處一切衆生皆有成道之性但被四見所隔故不能得登也故常因淨因至除滅四見故謂無爲者常因淨因等在十乘内被蓄不得用到無爲乘處則感金剛始方得用也無爲乘處乃萬因所集故云具足因處也此乃超三界斷除四性見惑所以名曰無爲也能得無爲亦名無爲者道理第十無乘未是無爲以能感得後無爲金剛大果故名無爲此因受果果籍因也無爲果者即是無爲者無爲果即金剛大果也此果始是無爲也非得言無爲果即是無爲者此無爲果力爲果乃是三界九道衆生從無爲生名爲無爲果而非得即是無爲也如九道三界至無爲因故非無爲者明九道三界等亦是無爲果然非即是無爲何以故無爲生故得是無爲果然非是常住自在之無爲乃是無爲之因故非無爲也一無爲非果非因至無礙空者無爲有三種一無爲非果非因二無爲亦果亦因三無爲但果非因也非因者即是四無礙空洞空洞虚洞清洞微等也因名牽召果名酬答虚空無有牽召酬答故云非果非因也亦是縁果縁因至故名縁果者明虚空雖非萬物親因親果亦能爲萬物作縁因縁果也何以故能生三界九道等爲縁因三界九道四迷滅盡與空今德故名縁果也二無爲亦果亦因者二無爲即是第十無爲乘也亦果者能爲前十六聖乘住也亦因者爲金剛大果作親因也所謂第十無爲乘處至内觀外觀者明第十無爲乘處既萬因所集故言具足諸觀也頓觀者本空觀也漸觀者信疏觀等也大觀者大乘人所修之觀也小觀者小乘人所捉之觀也空觀者觀一切理空無一有性也有觀者前論於空空亦涉有今論於有有亦亘空也定觀者常觀也不定觀者無觀也吉觀者持戒之觀也凶觀者破戒之觀也事觀是即目所覩理觀是非眼心所照内觀觀心外觀觀色也諸一切觀至生無量觀者生道仙並是七仙之觀也生者空忘智此時始生故云生道者通也前生觀時空忘智慧雖生智力微弱未能制伏至道觀智力漸强稍能通伏故云道也既能伏則得無量觀生也所以諸一切觀並從生道仙而生生道仙能生無量觀也乃至精進至所謂果門者至精進乘空忘智慧起即牽後无爲大果故云方无爲也爲後大果之門故云所謂果門也道理生觀空忘智慧已生應言生无爲今至精進始言方生无爲者明生觀時雖生但智力微弱被惑入體至精進乘能斷惑體明故云方生无爲也此門能生金剛大慧至所謂因門者此門者即是無爲乘爲大果之門也此門能生後金剛大慧等也洞玄靈寳左玄論卷之一
