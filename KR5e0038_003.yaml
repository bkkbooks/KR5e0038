body:
  text: 洞玄靈寶左玄論卷之三伯七無上上三十六部經王品第五者夫經有三洞作三時而出若洞真乃以龍漢元年天寶君所出主開明洞玄以赤明元年靈寶君所出主學士懺謝洞神乃以開皇元年神寶君所出主召録百鬼三洞洞有十二部三洞合成三十六部為諸經之王若十二部從卷而數若三十六部逐義而分也我常從師至所謂祕事者我者論主自謂常恆也一本作嘗字嘗曾也云我常從師受學師乃以學法教我使我修行此十二部經也修十七聖乘以作因門三十六部經以為船舫也祕事者祕奧之事也此之所論乃説天尊大果此果乃藴藏智慧故云祕事也所謂十七聖乘至父母乳船者明此經人為十七聖乘德衆作父母乳船治護運載也父以喻道外明父為一家之長內明道為萬道之尊也母以喻師外明母養兒子唯承父教內明師教弟子唯承道之經法也乳以喻經外明母養兒更無别法唯以乳哺看養內明師教弟子更無别法唯用經教也一解通以喻經明此經為十七乘人為父母乳船也善能生長至除滅異道雜仙者明此經能教人行行成於無上道王也除滅異道雜仙者異道雜仙修行隂陽星曆邪法異術等此三洞大乘之教一行則剝奪其教無所施用一解此經一出即除滅異教故經云誅罷偽座即此義也此法至要至妙故曰作經者此法者三十六部經法也要者其文要而略其理深而妙也真者非偽亦云無雜也無有異道雜仙經典文句及世上言辭間雜其間也亦不為三界大魔及九道衆生之所毁壞變易也常者經訓常也常為成道之徑路賢聖之通由故曰經也所謂經名字至十二章表者此出十二部經名字次弟解釋具在後文也問曰云何至章表耶者此自發問欲曉人也答曰如至道至名為慧本者如至道行行名為慧行者明欲求訪至道所行之行並須修十七聖乘智慧之行以斷伏除滅也行端正道者若行此智慧之行慈悲泛愍不習邪教雜道異師法術故云行端正道也又能扶將十七乘人到金剛大果智慧之處故名為慧本也故論緯云非愚本而本愚也非愚本者即是慧本也而本愚者為愚人作法教之本也從慧本至四義成文者慧本既為十二部之本故從慧本生玉字也所以名玉字者具含四義四義者一明玉有潤二明玉不受瑕三明有聲四明有德明此經喻之如玉含此四義故云玉字也四義者至無上果實者此即是第一明玉有潤也若就外解如山有玉則林木為之不枯內明此經能資生善慧根株得成無上大道故喻之如玉也二謂清潔至無上上處者此是第二明玉不受瑕也外明玉有瑕如現於外內明此經清潔澄明無有雜道異仙文辭章誥及世上凡人章句之所問雜若有之即現也無上上處即天尊大果也又能運載衆生到無上上仙金剛大果之處也三謂至微妙聲師者此是第三明玉有聲也外明玉有鏘鏘之聲內明此經體有清靜微妙音聲也若有善樂聽習音聲衆生得聞此經音聲者以其有善習之心故即得生愛樂無上法聲之智也以其能愛樂無上法聲故故能辨鍊一切諸聲還得如微妙聲師微妙聲師即是元始天尊也四謂一切至喻之如玉者此是第四明玉有德也外解諸石之中以玉為貴故老子云美玉處石間也內明諸道之經以此經為貴喻之如玉也我師者天尊也及我弟子者論主弟子方也亦從慧本生神符至故名神符者符者同也明此經為萬靈萬聖之所歸宗幽深寂漠無有窮極端際最為第一也既為一切神靈之所歸憑無有乖異故曰神符也亦從慧本生妙訣至故名妙訣者訣於妙事也故論緯云非粗訣訣粗唯妙訣訣妙也善能分判禍之與福好之與惡方於理最為衷當無有方雙也又一解衷者中也善能分判禍福方於聖中更無匹雙也訣者所説之理訣無差謬也故經中訣不言心造五逆之罪身口為之暢成而能得身心樂無有惱害也亦復不言歸投於小仙雜道能得破壞生死大因得斷除四見之惑登於金剛之果也復能分别辨説一切修道之門教令修學得去遠九道境界也又有弟子咨雜仙疑問善升分判得理無有差謬故云妙訣也亦從慧本生戒律至説於禁戒警防惡見者戒者止也亦善也律者法也凡夫之人具四見者未入仙品不能斷伏也不具者入十乘已能斷惑也如斷本分即是不具也亦云七仙能伏本分未果亦是不具也十乘已還通是不具也十乘已還通是凡夫位故云凡夫之人具四見不具四見也六種心用者即是六學照色之智也及造取者四心也凡夫心智微弱不能並緣以四心方辨緣境也明凡夫有此六種心用及四心方為有此四見之惑所以迷荒倒蹶縱恣其心致有墮落三塗五苦也不能得者不能速得成無上道也一云不能速得無上道心起也警覺者警防覺察外境也天道大道也天道有本願心故為説經戒正欲使其警防惡見也亦從慧本生靈圖至故名靈圖者未者未來也五道大師者天尊也弟子者天尊弟子也舊解圖畫形像名曰靈今解不然明末世衆生有幾乃在於未來不能得值五道大師現身説法天尊弟子撰集天尊所説之事或説丈八金身千尋玉貌現形弱水示迹長桑顯質火中隱形珠內羅列證明顯發聖事之眉眼故曰靈圖也亦從慧本生於譜録至根源者譜録者譜祖也録記也如窮討記録祖先源起之事記或龍漢赤明方往劫祖始之事故云譜録也亦從慧本生方法至得無量觀門者方法者如説三歸或明十戒及十七聖乘觀四方為入大道之門户各有於方次也歸身者以我此七尺之身歸憑大道也歸神者神即心神以此心神歸憑於道也身粗易役所以前歸神妙難運所以後明命者色以連持不斷名之為命也以此連持之命歸憑大道也既色心相連稍難運役是故後明也三種之智既成能生至信方得入前二十四觀及無量觀門也亦從慧本生讚誦至故名誦説者舊解讚者嘆慕也誦者從長行之內出故云誦也今解未必然皆是讚美之辭也如此法實至妙及無頓頓等皆是讚誦也明十方聖衆欣慕天尊之法心生踊躍不能止息讚詠誦説故云誦説也亦從慧本生呪術至降伏無量衆魔者舊解呪者祝也術者譎也譎詭成事名之為術如刺皮帶以為行蛇結巾以為走兔皆為詭術今解不然皆是諸雜祝術方法如酆都衛靈方呪皆是呪術也威儀法行整者威者畏也儀者宜也其威儀法行若整則能召制十方真仙法衆又能降伏一切衆魔鬼魅也亦從慧本生於記傳至通布謂十二部經者傳者傳也如天尊弟子十方衆聖方書寫此十二部經流傳於後故言記傳也亦從慧本生章表至最妙上上經者舊解章表者乃是章辭表奏等名為章表今解不然章者明也表者發也明此經乃章明表發於聖理故云章表也洞玄靈寶左玄論卷之三
