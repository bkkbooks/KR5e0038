body:
  text: 洞玄靈寳左玄論卷之二伯六夫功德師者即是天尊功德高大爲九道之師也惑累既無體清德淨故清明皎潔也無諸苦惱蕭然獨脫故云常樂自在也智慧與虚空合德共成身命故云虚空慧命處也爲金剛大果作起生之門故云因門也三无爲者至所謂四虚空德者此第三无爲但是金剛大果非是因門也此果乃與四虚空合德故云四虚空德也此德非異道至故果無四空者此德即是金剛大果之德也此德非是異道雜仙所修學能得也何以故雜仙既因無十四觀故果不能得與四空合也所謂十四觀者至内觀外觀者此十四種觀前已具列今復重岀者欲明雜仙不能修行此十四種故重出耳委曲不異前解諸觀中見至無色性皆不得我意者諸觀者緫明前等觀所明也觀者觀也觀察諸縁若知名之爲觀也有色性無色性者如在真一觀中空色得盡名之爲無餘觀復有色在故復言有也一解如在觀空色得盡名之爲無然色從空生有觀不能空不見色之根本又是有色也有貪無貪至皆不得我意者有者有貪無者貪惑與布施解相伏所言無貪者施解已伏貪竟言有貪者貪從空生此有解雖能迮伏未見貪之根本未能除斷故人是有貪也有嗔無嗔者明嗔或與喜智相伏言無嗔者喜智已伏竟有嗔者亦未見嗔之根本也及内觀外觀言有無皆不得我之本意也何以故如十七聖乘至非謂十七聖乘人者明十七聖乘人作空觀時亦不得謂空亦不得謂不空若言不空空觀空境以意若言是空觀外復有色果未盡一解云亦例貪等也一解云忘空不可言有空有不空須遣此空也若觀空作空作不空意非謂十七聖乘天人也又作有觀及内外觀時至若執定有定無者即失我意者色者諸有之境也夫在前爲因在後爲果也不得言有觀中定有色定無色也何故然雖有觀觀色言無而未見色之根本又是有色義一解雖空色因盡其果又在貪嗔等亦然所以不得定言有言無若定執有無即違失我意何以故如入第一至定無見即違意者入第一乘精進觀時太一智起斷本分或滅故云無見也上分見果又在復是有見也所以不可定執言有無也夫諸觀者至謂五虚空者夫觀者觀也觀察前境諸物若知故名之爲觀也是衆生第一者是第一利根衆生所捉此頓觀也不以細縁觀於大縁者不因階級次第遣除如以寸空尺以尺空丈者也大縁觀成者空觀成也言不因階無級無勞比並懸知一切萬有必生於空離空蹔有有非常實必滅於空作如此觀察故名之爲頓也細縁即三界九道衆生及二十五性色等大縁即五虚空也漸觀者至故名爲漸者漸者階次之名五虚空謂麤空妙空不定空彼此空造作空也未能頓見此五種虚空不知三界九道二十五性色等本從空生不能捉本空未以因空果乃於有法中次第窮檢思惟觀察故名爲漸也大觀者至故名爲大觀者大性衆生者大乘利根人也十七聖乘者欲界有八一生二道三仙四神五真六明七老八精進色界有三一並明二大戒三滿心無色界有三一普通二轉遍三法際無色界外有三一處上二後身三無爲故名十七聖乘也銷滅四見者一本分見二上分見三性無慧見四窮無見不死命者凡夫命堅聖人命身與空合德故身不爲諸惑所覆寅卯所遷故云不死命也明有大性衆生見此十七聖乘决欲修行銷滅四見求至金剛不死命處故名爲大觀也小觀者至故名小觀者小觀者小乘人也夫大士運心必以慈悲爲首隨機赴濟不避艱辛今小乘人不修慈悲智忍但單行信空六覺及精進等易行但住欲界第七乘老觀其力勢行亦可至無色而未能縁太一不定空境斷除四見但能迮伏而已故云具足四見也意謂小乘人軄分亦應不啻如此直是貶抑小之吉耳空觀者至故名空觀者觀一切萬有並悉是空無一有法之性而非空也如三界九道二十五性色等形相雖各有異相其相還悉是空何故然空爲有有本從生有故有終歸空也有觀者至故名有觀者一往而分用森然爲有闃寂爲無更復椎尋而空有等觀前空觀中空皆隔有今之有觀有亦亘空故言二皆名有不言無無者不可言無此無也若無此無無便成窒礙之物如此推尋檢察故名有觀也定觀者至故名定觀者定者圓常之義也明虚空古者已來無有遷變動也若有經論說謂虚空有生死者彼經論非是正智之源也人說亦例也金剛亦復如是明金剛大果亦無生死若說謂金剛有生死者亦非正智也不定觀者至故名不定觀者不定者無常之義也明三界九道二十五性色等盡帶無常時節須臾從變倏忽遷移或去或來故是不定也如生正智機惑輕重者如欲生正智生正智須隨其根機輕重勝劣利鈍也機根若利須捉本空觀機根若鈍者須捉次第微觀等也隨其性分觀察則能覩照吉祥也一解云如起正智照物之機當隨機大小若大機者則示深教若小機者示以漸教隨其根機相邈並能照知故云隨相隨知也此乃隨機變改故云不定觀也吉觀者至故名爲吉觀者夫吉者真祥之謂也即是持戒之觀言修奉諸戒則吉祥安集也如見者如有所見之法即推察修行之也十聖安隱乘者十乘也明十乘是中安隱之乘也六種通智者即是六通照色之智也四内行者是四平等之智治内之行也十戒者大戒所明十戒也二十四戒者明真科所說二十四條科戒亦老子有二十四戒也無量戒者百八十戒三百大戒等也四空藏者與四空合德也藏者言能藴藏智慧故云藏也何以故衆生爲四迷之所繫縛不能得出離生死若修此諸戒能得去離此生死臭穢境界脫於四迷繫絆到金剛大果四空藏處故名爲吉觀也凶觀者至故名凶觀者夫凶者禍變之辭也此是不持戒之觀言凡夫具此諸見故名爲凶觀也倒見者如以善爲惡謂是爲非方圓錯領青黄反執也惡見者每事損減無慈善心作地獄謀退天人果此之謂惡也惑見者迷滯不了觸境惛矇名爲惑也苦見者一切苦惱之謂或刀林蓊葺劎嶺崢嶸身經三掠痛羅百毒等也樂見者適悅之謂凡夫好因妄樂而構苦因也生見含血之徒心多重命畏彼之死貪此之生不能等觀存亡而封執生死名爲生見也死見者死逝也色心各去名爲死也臨死之時心神欲去血脉將斷骨肉俱移以此剔裂多諸苦痛凡夫之人盡憚於此故名死見也亦言舉止乖道失生元之炁故云死見也無量違見者有無量種違理之見以有此諸見故生三界之中不寧之處也理觀者至故名爲理觀者理者即是無上大道之理真實住處亦即是金剛大果之處因門謂十轉爲金剛之因門此門但在三界内外故知無上天尊金剛大果之地非是因門也能如此思察故名爲理觀也事觀者至故名爲事觀者事者即因所覩之屬也言事觀但說三界九道二十五性色等不說無上天尊金剛大果真實住處故名爲事觀也内觀者至故名爲内觀者夫金剛是堅常之稱言異道雜仙皆憑之若母故云道母也言十七乘智及四等心皆是心門用事少施於身手故屬内也明衆生修行四等之智於嫉妬境中善能制伏不令起作也亦不起心見諸惡見等也非見者謂雜道異仙所見是非理之見也是見者是其所是之見也外觀者至故名外觀者夫内觀觀心外觀觀色心縁理境故屬内五根矚色故屬外也明一切諸色各有根性能於此根性之中無起心作攀縁動作之相也甚能制一切發相者心情欲發攀縁前境人善能制伏也守護扶將者守護六根扶將九道衆生不使與外物更相侵觸故名爲外觀也是十四觀之者至不爲天魔異道之所試害者明此十四觀乃是十七聖乘德衆常所施行爲自爲他思惟觀念念念相續也爲他者引物使修爲自己者自觀察若在七仙則慈心不恒故論文云慈心或來或不來若入十乘慈心則恒故能念念生續不復斷絶也假令三界之内悉變成火及遍是九幽地獄之苦燒煑此十七聖乘之人爾時其心念亦無移轉也何故能然以其已能翦滅性見之本入不退之乘其乘既名中安隱故不退作九道衆生又無畏忌故不爲天魔異道之所試害也性見本者本分惑也本分爲四見之母故云本也入初乘即滅本分也故云翦滅見本也善能救應十方至皆悉成善瑞者明此十七聖乘德衆復善能救應十方世界天上地下一切衆生危厄之難也不如意衆生者謂衆生在不寧之地也若在臨命終之時及爲縣官惡吏之所拘録或遇瘟邪蠱毒虎狼蛇蝮惡夢見惡惡具惡果惡因者爾時能諦心審念十七聖乘德衆及無上天尊者皆蒙救拔其所有惡事皆變成善瑞也何以故皆由十七聖乘至蒙福祐者本願者明聖人有本願之心願度一切衆生也歸趣父母者爲衆生作歸憑趣向發心之地又是萬物真父母也何故能得前諸惡事悉變成善瑞乃由十七聖乘德衆無上天尊等有慈悲本願之力故若有一一衆生來歸救之者皆即蒙福祐也在第一乘時至四見果分者第一乘即是生觀也空見始生者空忘智慧始生也初侵四見果分者四見果分是本分未果離障七仙此生觀初侵伏四見未果之分故士初侵四見果分也道理生觀未能伏今云伏者只是結解對或解生侵在其分說言侵耳慈心或來至慈見亦復如是者明在生觀時智力既弱伏或不禁乍起乍伏時有時無慈用不恒故云或來或不來也七乘空見慈見亦復如是者慈見者慈悲之見空見者空忘智慧之見七仙中縁得少分空理故名爲空見也明七仙内空見慈見等亦盡微弱不復能恒時有時無惑去來也何以故空見者至雖被覆制不能無見者無所有見者觀一切理空故云無所有見也果母者本分是惑果之母也故子恒生者上分已去及未果等是惑子也覆制者壓伏也明在七及時惑母既在其子恒生雖復壓伏不能得無於四見故空見微弱也慈心者爲空見作因至慈心不恒者先修慈悲方資生空智故云慈心爲空見作因也亦如本分爲嫉妬暴虐作因者本分是通惑爲萬惑之因嫉妬等是别惑並從本分生也明慈悲爲空見作因正如本分爲嫉妬等作因也雖然解則從别生通故慈悲别解生於通解也惑則從通生别故本分通惑生暴虐等别惑也以因在故者以本分惑因既在故其惑果既生故慈悲心用不能得恒也第七兩觀亦如是者第七者老觀也兩觀者中小二乘之觀也明老觀之内有中小二乘之人慈心微弱伏惑亦復不恒也一解第七者從老觀下數以生觀爲第七也明生觀始入仙流慈悲未能伏惑所以其二乘慈悲不恒也第八精進至具足空見者第八精進乘若傾上作語實未具慈具悲傾下作語故云具也以籍前七仙内慈悲有解資發太一空智得起斷除本分惑想縁得不定空理故云具足空見也何以故第八乘時至證無有見過者慧命清靜者以斷本分竟得空忘智慧起惑不入慧體故云慧命清靜也無有見過者無有惡見之過也一云無有性見之過直言無者此乃尅分而論亦是傾下作語耳故能毁壞生死大因至證不退乘者生死大因者即本分也四性見王亦本分也明衆生辭空入有已來起惑必先起本分係在欲界爲諸惑之王故云四見王也又爲入生死之大因故云生死大因也到安隱處者即是十乘通名中安隱也不退乘者入初乘太一智起更不退作具縛凡夫故云證不退乘也證此乘時至天魔異道不能阻壞者無上道王者天尊大果也若得入十乘既能斷滅諸惑慈心用恒故多作智慧之行舉心契誓决取無上道王也不爲天魔異道之所恐怖阻壞也又能斷截無常根本至不失道心者無常根本者亦是本分惑也道心者勤深求道之心也既入精進乘更不懈怠失念起諸惡惑故云不失道心也决不作二乘七觀至故名安隱乘者二乘者中小二乘人也七觀者七仙之觀人也既證十轉故不退入中小二乘及七仙等觀作九道衆生人得離於三界怖畏之境故名爲安隱乘也乘者一種至何以故亦離無上道心者明乘有二種即是離與不離等也離者度修慈悲習諸智慧得證無上果王離三界五道等也不離者與造四見不持戒行等不離三塗五苦之報也然不離中復有離離中復有不離亦悉可解耳乃至拔出至並名乘者明乘有多義乃至拔出行運逝動去進寸並是乘義拔者從上拔下出則據果行運逝動等則據因也我有乘者至故得四空者我今所有乘者乃名於去乘也然運載於物去與四空合德到不死之處也此乘乃名戒名慧寸故得與四空合也異道雜仙所乘者至故非我乘者明異道雜仙所行之乘既非智慧具足十惡五逆不能修持十戒之行四等之心故墮落三塗輪迴五道也我乘能得見三千至謂無上道王者三千大千世界者還以恒沙爲喻如以一恒沙方廣四十里還數此四十里沙一粒沙爲一世界一世界是一日月所照一恒沙爲一千世界三恒沙爲三千世界合此三千世界爲一大千世界也明我之所有乘者能照見此三千大千世界土地明暗處所人畜色心見無不明也若有一一衆生至不墮落三塗九幽者此明若有衆生值遇此書修奉之者得如是之福也洞玄靈寳左玄論卷之二
