body:
  text: 洞玄靈寳左玄論卷之四伯八無上至要道術者即三洞經也明此經大慈平等廣度三界五有捨放遺棄之義既章明表發故非隱藏也上上者三十六部經是上中之上也以有此義故得稱十二部無極至真至妙最上上經也復有問曰至爲異同爲異也答言至頂頂乘林者頂頂乘林者乃是上上智慧之林也言慧本爲根十一部爲枝莖花葉共成頂頂智慧之林也復言慧本至十二德耶者問云慧本何意但生十一部不生一部二部至無量部也若然者無上大果之德不應有無量德亦應止有十二德也答言至世行不世行故果者分别者十二部經也無分别者萬德也世行者十二部經流行於世不世行者萬德不行於世也復言至不從玉字生耶若但從慧本生妙訣方不從玉字生者令敬施福事亦應但從慧本生不從妙訣生也答言合十一部至作福生者合此十一部並通名慧本亦俱能生於福事若有一一衆生能歸依信向此經者不言但慧本生福玉字方不生福所以謂三洞十二部經爲福之王也四安隱平等智夫四安隱者即是四等慈悲之行也此四等於前怨親境上無有偏黨名爲四等也且四等各有九品須捉最後第九始成四等之行也若初學以下怨對中親若學成以上怨對上親故論文云若人修行四等見常安隱也如經中說至教爲慈觀嫉妬者或憎他之有恚己之無名爲嫉妬嫉妬是别惑慈是别解慈解正與嫉妬或相治慈名汎愍亦名憐解若有慈心則嫉妬不起也暴虐多者今修習悲暴虐者或心行怉殺父害君打棒衆生暴虐是别惑悲是别解悲解正與暴虐或相治悲名憐惻亦名傷悼若有悲心則暴虐不生也二智不住至裝嚴慈悲者二智即是慈悲二智也慈悲既是有解未能斷惑但能迮伏常自不禁有時簡起不能得恒故云二智不住也既其不住縁於太一不定空境資生智忍智忍既生則爲慈悲除滅嫉妬暴虐等别或所以得慈悲體明方始得住也排滅三界九道一切行報夫三界九道衆生被四見或問感生九道今既修行四等空智既立既則能滅除九道衆生四見業行果報也何以故智忍空門至心惑時慈者在七聖觀者即在凡夫也爾時空智未立未見惑之根本不能斷除四見慈悲微弱止能迮伏尚自不恒有時失念故云不牢心或時有慈或有時無慈也悲障見時慈悲則不被人者悲障即是嫉妬暴虐也此障既現慈悲不得用故云不被人也乃至一切智行心復如是者明一切諸智並悉如慈悲等也如精進與懈怠或相治懈怠若起則精進爲之伏藏一切諸智並例如此也所謂非空智忍名空者非空者明慈悲是有智非空智也智忍始名空智也名能剪滅至智數中者能剪滅者即是初乘空智起斷除本分惑之根本不使入於智數之體也是故萬智得住名須須乘者惑既不入智體所以萬智得住名須須乘也須須乘即是精進乘也以十乘能牽須須之果故云須須乘也時未入住者過歷無數處者未入住者即是未入十轉乘中也在不住中者在十轉之外也既未入轉中則感生九道過歷無數處受生也若在天上至須須乘者雖報生九道若能於天上人中修習不倦故能得證十乘安隱之處也前二智慧下流功德至上智不藏者前二者慈悲也下流者被下劣境也上智太一智也若能廣修慈悲則資生太一空智不藏也若九道衆中至作福因縁故者若九道衆中有一人能修四平等一念二念者即得一切天尊及無量大仙等並皆恭敬此人何以故其能修行四等四等乃是一切天尊大聖成道福田大因故也一念二念即是一品二品亦云一等二等也若有一一衆生至所有苦行苗母一切焦枯者摇動驚動毁壞也苦行苗母者一切惑惡根株枝葉也聞有人行四平等並皆焦枯摧折不能得生長也三界六天至一切摧折者三界六天魔王並皆啼泣有三義一者人若修善則度於魔界魔則畏失其民二者又須恭敬三者又須傳送所以魔不願人得道見一人修行四等並皆啼泣其所有魔軍甲仗亦皆摧折也何以故一切諸善至以嫉虐故集者慈悲是别解嫉虐是别惑夫慈悲不起則已起必帶善以利物故云一切諸善以慈悲故集嫉虐不起則已起必帶惡以損他故云一切諸惡以嫉虐故集也此四平等見無輕重至安隱智門者見無輕重者不見尊貴爲重卑賤爲輕亦不見己親爲重怨家爲輕常自平等也常得安隱也門者四等之門能行行如此始名爲四等智門也一切無上天尊至從此門來者無等等者明異道雜仙所得之果不能得等於天尊之果故云無等等也上上大果者即天尊大果也從此門來者言天尊大果聖人並從四等之門而來也有無量大力至恭敬衛護此人者弟子天尊弟子也明此四等有無量巨大之力故有一一衆生修行之者十方一切天尊及十方一切聖衆等並皆歡喜衛護此人也若有一一衆生至一切惡鬼不爲灾疫者一品二品者一等二等也亦云四等各有九品是其一品二品也國君者有道之君也瑞穀者麥抽雙穗禾達兩苗也此言若有一衆生所在之處能行此四平等之智一品二品者隨其所在土地災蝗不起風雨依時國君柔和地豐瑞穀災疫不行也若有二衆生至無諸妖雲者前明有一人行平等其力尚輕但能使災星不起風雨依時今明有二衆生修行四等智力則大能得天炁光明無諸妖怪之雲也雷電不怒至繞匝日月者夫雷電鼓怒皆由無人行四等所以隂陽否結雷電霹靂鼓怒爲聲也今既有人行四平等所以雷電不爲之鼓怒又能令日月常有素彩光華澄明清潔光鋒精耀繞遞日月也若滿三人至到無上大處者若滿三人行此四等者其功德周備天地不可言說譬喻也能爲三界九道衆生作出生死橋航傳送九道大衆到無上金剛大果之處也故是我師及我弟子至常行此行者我師者天尊也我弟子者論主弟子也此行四等之行也我師及我弟子等常自慇懃頂戴修行此四等之行也至我師處猶行此行者至我師處者天尊大果之處也常行此行者猶行四等之行也夫行在因今果地乃云常行此行者有二意一欲勵於後學故云我師處亦行此行也二明聖人有本願之心故常行四等以度衆生故來三界一切有處至催驅四見徒衆者有處者三界一切有境之處也本願行者即是本因願也素願者亦與本願相似是素來有於此願亦云行願者行也地有此願願度一切衆生也相資者衆生有機感我又有本願心相資故我常來三界行此四等漣汲催驅四見徒衆也從上拔下謂之漣汲從下拔上謂之催驅也中有雜仙至我心不安者明爾時座中有雜仙名曰獨行而作問也云我學我師經典三十二歲遍知一切隂陽星曆人倫法用並悉通了未聞今日論主異說如此我心不安也我師及我至勿令屈塞者獨行云我師語我天下地上更無有一人能勝於我若更有一人異我所學者我須枕折令其降伏我今故欲難窮此義須分明解答勿令有於屈塞也時無上高上大法師至我爲汝答者無上大法師即是論主也無上智師即指天尊論主云我乃從無上智師學得此無上之智資汝今來所問我當解之時獨行即問言至非謂具王四義者此是雜仙獨行領論主前所說之義以發問也不然者我謂不如此也但是有於言語而無義理則是四敗之義非謂如王等四義也明論主雖未說四敗常說雜仙經義有四敗說論已來雜仙已在彼座所以雜仙講論謂主所說既無義理是具四敗義非謂具如王有四義也何以故若日月至故義非謂四平等力者我云日月由無雲故明有雲故暗春陽故明秋隂故暗此乃由春秋明暗亦非關行於四等也龍興則雲起虎嘯則風生陽震則雷電奮動隂靜則雷電潜亦非由行四等也異於我師至亦非謂四平等力者今聞此說乃異我師也我說我師計及我經並云天子治化應天則穀稼滋長地生瑞草亦非由四等之力也復言是故我來至云何發言多諸敗義者復言是故我來常行此事者既云常行云何未來之前不來已來之後復去既有來有去何謂常行仙師如此諸義非謂四等具王四義乃是具四敗也云何發言多作敗義也時高上法師笑而答曰至故不得應天子者高上大慈憐其不悟故笑而答之也過言者過失之言也春夏相反者如春行冬令冬行春令也日月昏蝕者薄蝕也鈍暗者重暗也地鹵乾瘦者地生砂鹵并荆棘也此皆由無人行四平等之智彼亦不得應相天子也四平等智善調隂陽至所作皆善者此四等智善能和調隂陽消伏灾惡制於凶敵使鄰國不興甲兵能行此行所在皆善也我以二因縁故來三因縁故去者二因縁者一是衆生機感二是我有本願心也三因縁者一是說法竟二衆生機情已謝三爲更久住恐衆生生厭患故須去也外藉因縁至來去相資者外賴因縁即衆生機感也我内常即我本願心常欲濟衆生也來去相資者機與本願共相資藉也所謂二因縁至還於無所在處者警我者警防護也爲衆生說戒以警覺愼防也非我舊處者謂此應機之地非我舊在之處也爲具如此三種因縁故我須還於無所在之處也是時獨行復言至云何欲還往其處者此是雜仙問論主無所在處往還問答也高上復言曰至故名自然者二自然者三界内是一自然三界外是一自然故曰二自然也五自然者五虚空也異於處空者此自然異於五虚空及五道也不逐繫絆者不爲四見惑累之所繫縛故名曰自然也具足自然至故處無所在者具足自然即是天尊大果大安隱處也無高無下者果中無有高下音樂六甲八卦五行屋舍等也六甲五行並是無常用事故果中無此也四無爲即是四無礙空也與此自然虚空合德共成方命故處無所在也然處非木石至故在處者然此自然之處非在木石五數諸天三界雜仙境界故言在無所在處也其時獨行至聽其受學無上真言者世師者世間之師也具足癡慢者無有空有二智斷伏通别二惑故云具足癡慢也賜慈悲力者論主既行慈悲願賜慈悲之力不以見嗔也願爲弟子賜聽受學無上真言也高上即告其五戒至七聖智乘者七聖乘即是七仙乘也求受學所以即授其五戒令修習七仙聖乘之行也洞玄靈寳左玄論卷之四
